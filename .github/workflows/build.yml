name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build macOS App
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Show environment
        run: |
          swift --version
          xcode-select -p
          node --version

      - name: Install Node.js Dependencies
        run: npm install

      - name: Rebuild Backend Binary
        run: npx pkg server.js --targets node18-macos-arm64 --output build/server-backend

      - name: Build Swift macOS App
        run: |
          cd macos-App
          swift build -c release 2>&1
          cd ..

      - name: Create App Bundle
        run: |
          APP_DIR="Local RTMP Server.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp macos-App/.build/release/LocalRTMPServer "$APP_DIR/Contents/MacOS/Local RTMP Server"
          cp build/server-backend "$APP_DIR/Contents/MacOS/server-backend"
          cp build/icon.icns "$APP_DIR/Contents/Resources/AppIcon.icns"
          cp build/Info.plist "$APP_DIR/Contents/Info.plist"
          xattr -cr "$APP_DIR"
          codesign --force --deep --sign - --entitlements build/LocalRTMPServer.entitlements "$APP_DIR"
          echo "App bundle created."

      - name: Create DMG Installer
        run: |
          chmod +x create-dmg.sh
          ./create-dmg.sh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Local-RTMP-Server-DMG
          path: "*.dmg"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

